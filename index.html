<!DOCTYPE html>
<html>
<head>
  <title>Our 1 Year Garden 🌸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🚲 BIKE SCENE -->
<div id="bikeScene" class="scene active">
  <div class="bike">🚲</div>
  <p id="startText">Tap to go to Garden</p>
  <div class="wind"></div>
</div>

<!-- 🌸 GARDEN -->
<div id="gardenScene" class="scene">
  <div class="roof"></div>
  <div class="flowers" id="flowerGrid"></div>
</div>

<!-- 💌 LETTER -->
<div id="letterScene" class="scene">
  <button id="backBtn">⟲</button>
  <div id="letterContent"></div>
</div>

<script src="script.js"></script>
</body>
</html>
