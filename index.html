<!DOCTYPE html>
<html>
<head>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600&family=Pacifico&display=swap" rel="stylesheet">
  <title>Our 1 Year Garden 🌸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <link rel="stylesheet" href="style/style.css">
</head>

<body>

<!-- 🚲 BIKE SCENE -->
<div id="bikeScene" class="scene active">

  <h1 class="main-title">Our First Year Garden</h1>

  <div class="clouds">
    <div class="cloud"></div>
    <div class="cloud"></div>
    <div class="cloud"></div>
  </div>

  <div class="road"></div>
  <div class="bike">🚲</div>
  <p id="startText">Tap to go to Garden</p>

  <div class="wind-lines"></div>
  <div class="dust"></div>

</div>

<!-- 🌸 GARDEN -->
<div id="gardenScene" class="scene">
  <p class="garden-credit">Specially made for my Zerah</p>
  <div class="roof">
    <div class="roof-layer"></div>
    <div class="roof-layer"></div>
    <div class="roof-layer"></div>
  </div>
  <div class="flowers" id="flowerGrid"></div>
</div>

<!-- 💌 LETTER -->
<div id="letterScene" class="scene">
  <button id="backBtn">⟲</button>
  <div id="letterContent"></div>
</div>

<script src="script/main.js"></script>
</body>
</html>
