<!DOCTYPE html>
<html>
<head>
  <title>Our 1 Year Garden 🌸</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style/style.css">
</head>

<body>
<!-- 🚲 BIKE SCENE -->
<div id="bikeScene" class="scene active">
  <!-- Wind curves -->
  <div class="wind-curve"></div>
  <div class="wind-curve"></div>
  <div class="wind-curve"></div>
  
  <!-- Road line -->
  <div class="road-line"></div>
  
  <!-- Bike -->
  <div class="bike">🚲</div>
  
  <!-- Start text -->
  <p id="startText">Tap bike to enter our garden</p>
</div>

<!-- 🏢 BUILDINGS -->
<div id="buildingsContainer"></div>

<!-- 🏠 COTTAGE -->
<div id="cottageContainer"></div>

<!-- 🌑 WELCOME -->
<div id="welcomeScene" class="scene">
  <div>Welcome to our Garden</div>
</div>

<!-- 🌸 GARDEN -->
<div id="gardenScene" class="scene">
  <div class="roof-container">
    <div class="roof"></div>
  </div>
  <div class="flowers" id="flowerGrid"></div>
</div>

<!-- 💌 LETTER -->
<div id="letterScene" class="scene">
  <button id="backBtn">⟲</button>
  <div id="letterContent"></div>
</div>

<script src="script/main.js"></script>
</body>
</html>
